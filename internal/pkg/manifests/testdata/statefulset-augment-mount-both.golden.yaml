apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: thanos-ruler
  namespace: test-ns
spec:
  selector:
    matchLabels:
      app: thanos-ruler
  serviceName: ""
  template:
    metadata:
      labels:
        app: thanos-ruler
    spec:
      containers:
      - image: quay.io/thanos/thanos:v0.39.0
        name: thanos
        resources: {}
        volumeMounts:
        - mountPath: /etc/thanos/configmaps/example-configmap
          name: configmap-example-configmap
          readOnly: true
        - mountPath: /etc/thanos/secrets/example-secret
          name: secret-example-secret
          readOnly: true
      securityContext:
        fsGroup: 1001
      volumes:
      - configMap:
          name: example-configmap
        name: configmap-example-configmap
      - name: secret-example-secret
        secret:
          secretName: example-secret
  updateStrategy: {}
status:
  availableReplicas: 0
  replicas: 0
