apiVersion: apps/v1
kind: Deployment
metadata:
  name: thanos-query
  namespace: test-ns
spec:
  selector:
    matchLabels:
      app: thanos-query
  strategy: {}
  template:
    metadata:
      labels:
        app: thanos-query
    spec:
      containers:
      - image: quay.io/thanos/thanos:v0.39.0
        name: thanos
        resources: {}
        volumeMounts:
        - mountPath: /etc/thanos/configmaps/example-configmap
          name: configmap-example-configmap
          readOnly: true
        - mountPath: /etc/thanos/secrets/example-secret
          name: secret-example-secret
          readOnly: true
      volumes:
      - configMap:
          name: example-configmap
        name: configmap-example-configmap
      - name: secret-example-secret
        secret:
          secretName: example-secret
status: {}
