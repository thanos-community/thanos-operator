- op: replace
  path: /spec/endpoints/0/tlsConfig
  value:
    ca:
      secret:
        key: ca.crt
        name: metrics-server-cert
    cert:
      secret:
        key: tls.crt
        name: metrics-server-cert
    insecureSkipVerify: false
    keySecret:
      key: tls.key
      name: metrics-server-cert
    serverName: SERVICE_NAME.SERVICE_NAMESPACE.svc
